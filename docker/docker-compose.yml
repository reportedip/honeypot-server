services:
  honeypot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "9090:80"
    volumes:
      # Live-Mount: Code-, Config- und Datenänderungen ohne Rebuild.
      # Persistente Files (config.php, SQLite, cache) bleiben auf dem Host.
      - ..:/var/www/honeypot
    environment:
      - HONEYPOT_PROFILE=wordpress
    restart: unless-stopped
